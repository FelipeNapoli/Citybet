<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/css/style.css">
    <title>CityBet</title>
</head>
<body>
    <header>
        <h1>CITY<span>BETS</span></h1>
    </header>
    <main class="container">
        <h2>Próximas Partidas</h2>

        <section class="grid-partidas">
            <article class="card">
                <h5 id="legenda1">Brasil vs Escócia</h5>
                <br>
                <div class="bandeiras">
                    <img src="src/assets/BandeiraBrasil.jpg" alt="">
                    <p>VS</p>
                    <img src="src/assets/BandeiraEscocia.png" alt="Escócia">
                </div>
                <div class="input-partida">
                    <input type="number" min="0" max="10" placeholder="Brasil" class="time1">
                    <input type="number" min="0" max="10" placeholder="Haiti" class="time2">
                </div>
                <button  class="btn-palpite">Palpite</button>
            </article>

            <article class="card">
                <h5 id="legenda2">França vs Noruega</h5>
                <br>
                <div class="bandeiras">
                    <img src="src/assets/BandeiraFrança.png" alt="França">
                    <p>VS</p>
                    <img src="src/assets/BandeiraNoruega.webp" alt="Noruega">
                </div>
                <div class="input-partida">
                    <input type="number" min="0" max="10" placeholder="Brasil" class="time1">
                    <input type="number" min="0" max="10" placeholder="Haiti" class="time2">
                </div>
                <button  class="btn-palpite">Palpite</button>
            </article>
        </section>

        <section class="historico">
            <h3>Histórico de Palpites</h3>
            <div class="titulos">
                <h3>JOGO</h3>
                <h3>RESULTADO</h3>
                <h3>GANHO</h3>
            </div>
            <div class="valores">
                <ul id="lista-resultados">

                </ul>
            </div>
        </section>
    </main>

            
        
</body>
</html>
